## Executive Summary

Fuel-Check is a two-client system for fuel availability visibility:

- **Mobile app (Expo + React Native):** Supports resident and shed-owner flows.
- **Admin web (React + Vite):** Supports dashboard monitoring and shed verification workflows.
- **Backend (Supabase):** Used for Auth, PostgreSQL tables, REST/RPC access, storage, and edge-function execution.
- **Push notifications (FCM):** Restock events are processed and delivered to users via Firebase HTTP v1 from an edge function implementation in this repository.

This report is built to match project reality as of the audited source snapshot, without including unverified performance claims or assumed production telemetry.

## Project Problem & Implemented Solution

### Problem Addressed

People need timely information about:

- Which fuel sheds are available nearby
- Whether target fuel type appears in stock
- Approximate queue situation
- When a nearby shed has been restocked

Shed owners need to update stock and price quickly. Admin users need visibility into registrations and report activity.

### Implemented Solution in This Codebase

- Residents can view verified sheds, map markers, stock signals, and community queue reports.
- Residents can submit community reports (fuel type, stock level, queue bucket, vehicle, comment).
- Shed users can update fuel stock, price, and next arrival date.
- Restock processing logic exists in Supabase edge function code and targets users by `nearest_shed_id`.
- Admin web includes login, overview metrics, report listing, and shed approval/rejection UI.

## Core Business Logic (Verified Algorithms)

### 1) User Role Resolution on App Start

Observed in `App.js`:

- App calls `supabase.auth.getUser()` and `supabase.auth.getSession()`.
- Role check attempts `profiles` first, then `sheds`.
- Timeout safety exists with a `3500ms` promise race.
- Fallback role defaults to `resident` on timeout/error.

Pseudo-flow:

```text
if user exists:
  role = query profiles by user id
  if not in profiles: query sheds by user id
  if timeout/error: resident
```

### 2) Distance + Queue Derivation in Resident Home

Observed in `src/screens/UserHome.js`:

- Haversine-style distance is computed from user location to each verified shed using latitude/longitude pairs.
- The formula converts degree differences to radians, then computes the great-circle distance on Earth.
- The code uses `R = 6371`, which is the Earth radius in kilometers.
- Recent reports (last ~24h) are used for queue approximation.
- Queue bucket mapping used in code:
  - `0-15 -> 7`
  - `16-30 -> 23`
  - `31-45 -> 38`
  - `45+ -> 60`
- Results are filtered by queue threshold from `user_filters.max_queue`.

Distance formula used in the app:

```text
dLat = (shed.latitude - user.latitude) in radians
dLon = (shed.longitude - user.longitude) in radians
a = sin²(dLat/2) + cos(userLat) * cos(shedLat) * sin²(dLon/2)
distance = 2 * R * atan2(√a, √(1-a))
```

How ordering works:

- After each shed gets a computed `distance`, the array is sorted using `sort((a, b) => a.distance - b.distance)`.
- That means the nearest shed always appears first.
- The first item in the sorted list is saved as `nearest_shed_id` for notification targeting.

### 3) Nearest Shed Persistence for Notification Targeting

Also in `src/screens/UserHome.js`:

- Processed sheds are sorted by distance.
- Nearest shed id is written to `profiles.nearest_shed_id` if changed.
- Timestamp field `nearest_shed_updated_at` is written.

### 4) Shed Stock Upsert Flow

Observed in `src/screens/ShedSubmitReport.js`:

- Upsert into `fuel_stocks` with conflict key `shed_id,fuel_type`.
- Fields updated include `stock_liters`, `price_rs`, `next_arrival`, `last_updated`.
- After save, non-blocking fetch call is used to invoke restock processing endpoint.

## Authentication, Session & Login Flows

### Mobile Session Pattern

- Supabase auth session is persisted via the SecureStore adapter in `lib/supabase.js`.
- `persistSession: true` keeps the session stored between app launches.
- `autoRefreshToken: true` keeps the session valid by refreshing the token before expiry.
- `App.js` restores the session on startup using `supabase.auth.getUser()` and `supabase.auth.getSession()`.
- `supabase.auth.onAuthStateChange` switches the active navigator after login or logout.
- The app routes users by role:
  - `shed -> ShedTabs`
  - otherwise `UserTabs`

Why the app does not ask the user to log in every time:

- The auth token is saved securely on the device.
- On startup, the app checks whether the token still maps to a valid user.
- If a valid session exists, the app skips the login screen and opens the correct dashboard automatically.
- If the session is missing or invalid, the app falls back to the login screen.

### New User Login Flow

When a new resident logs in, the process in `App.js` is:

1. The app starts and waits briefly for native modules.
2. `supabase.auth.getUser()` checks whether a session already exists.
3. If a session exists, `fetchUserRole()` checks `profiles` first, then falls back to `resident`.
4. The app stores the session in state and renders `UserTabs`.
5. `registerForFCM()` runs so the user can receive push notifications.

Code pattern:

```javascript
const { data: { user } } = await supabase.auth.getUser();

if (user) {
  const { data: { session: currentSession } } = await supabase.auth.getSession();
  const role = await fetchUserRole(user.id);
  setUserRole(role);
  setSession(currentSession);
  registerForFCM();
}
```

Logic:

- If the user record exists in `profiles`, the app treats the account as a resident.
- If the user is not found in `profiles` but exists in `sheds`, the role becomes `shed`.
- If lookup fails or times out, the app falls back safely to `resident` so the UI does not hang.

### New Shed Login Flow

When a new shed owner logs in, the same startup path is used, but the role resolution changes the navigator:

1. The login screen submits credentials using the shed login component.
2. Supabase returns a valid session.
3. `fetchUserRole()` checks whether the user exists in `sheds`.
4. The app stores the session and renders `ShedTabs`.
5. The shed owner can immediately access stock update and profile tabs.

Role lookup code:

```javascript
const fetchUserRole = async (userId) => {
  const roleCheck = (async () => {
    const { data: profile } = await supabase.from('profiles').select('id').eq('id', userId).maybeSingle();
    if (profile) return 'resident';

    const { data: shed } = await supabase.from('sheds').select('id').eq('id', userId).maybeSingle();
    if (shed) return 'shed';

    return 'resident';
  })();

  return await Promise.race([roleCheck, timeout]);
};
```

### Admin Web Auth Pattern

Observed in `admin-web/src/services/authApi.js` and `admin-web/src/utils/session.js`:

- Admin login checks environment values `VITE_ADMIN_USERNAME` and `VITE_ADMIN_PASSWORD`.
- Session data is stored in localStorage with a fixed token shape.
- `ProtectedRoute` validates the stored session and redirects invalid access back to `/login`.

Code pattern:

```javascript
const result = await loginAdmin(form);
saveAdminSession(result);
navigate('/admin/overview', { replace: true });
```

This keeps the admin area separate from mobile auth, which is correct for this codebase because the admin web app uses a fixed credential flow rather than Supabase user sessions.

## Notification Pipeline (Restock to FCM)

### Edge Function Behavior in `supabase/index.ts`

Implemented capabilities:

- Loads Supabase and Firebase credentials from environment variables.
- Builds OAuth access token for Firebase HTTP v1 API using service account private key.
- Normalizes newline formats in private key (`\\n` and `\n`) before import.
- Fetches events through lock-aware RPC (`fetch_unprocessed_events_with_lock`).
- For each event:
  - fetches eligible users via `get_users_for_restock_fcm`
  - checks dedup via `check_notification_sent`
  - sends FCM message in batches (`FCM_BATCH_SIZE` default `15`)
  - records outcomes via `record_notification_sent`
  - unlocks/marks processed via `unlock_event`
- Retry logic increments `attempts` when no successful sends and retries remain.

### Message Content Pattern

```json
{
  "notification": {
    "title": "Fuel Restocked",
    "body": "<shedName> has restocked <fuelType>."
  },
  "data": {
    "shed_id": "...",
    "fuel_type": "...",
    "shed_name": "..."
  }
}
```

### Mobile Device Registration Side

Observed in `src/services/fcm.js`:

- Requests notification permissions.
- Retrieves FCM token from Firebase messaging module.
- Writes token to `profiles.fcm_token` and timestamp to `fcm_token_updated_at`.
- Subscribes to token refresh and re-writes token.
- Registers foreground and background message handlers.

## Main Functions with Code Walkthroughs

### 1) `App.js` - Startup, Session Restore, and Role Routing

This file controls the whole mobile app boot process.

```javascript
useEffect(() => {
  setupFCMHandlers();
}, []);

useEffect(() => {
  const initializeAuth = async () => {
    await new Promise(resolve => setTimeout(resolve, 1000));

    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      const { data: { session: currentSession } } = await supabase.auth.getSession();
      const role = await fetchUserRole(user.id);
      setUserRole(role);
      setSession(currentSession);
      registerForFCM();
    }
  };

  initializeAuth();
}, []);
```

Logic:

- Starts FCM handlers immediately so notifications work in foreground and background.
- Restores the previous login session instead of forcing the user to log in again.
- Resolves whether the account is a resident or a shed owner.
- Sends the user to the correct tab navigator based on role.

### 2) `src/services/fcm.js` - Token Registration and Message Hooks

```javascript
export async function registerForFCM() {
  const authStatus = await messaging().requestPermission();
  const token = await messaging().getToken();

  const { data: { user } = {} } = await supabase.auth.getUser();
  if (user?.id) {
    await supabase.from('profiles').update({
      fcm_token: token,
      fcm_token_updated_at: new Date().toISOString(),
    }).eq('id', user.id);
  }

  messaging().onTokenRefresh(async (newToken) => {
    await supabase.from('profiles').update({
      fcm_token: newToken,
      fcm_token_updated_at: new Date().toISOString(),
    }).eq('id', user.id);
  });
}
```

Logic:

- Requests notification permission.
- Gets the device token from Firebase.
- Stores the token in `profiles` so the edge function can target the device.
- Updates the token again whenever Firebase refreshes it.

### 3) `src/screens/UserHome.js` - Map, Distance, and Nearest Shed Selection

```javascript
const processed = (shedData || []).map(shed => {
  const R = 6371;
  const dLat = (shed.latitude - userCoords.latitude) * Math.PI / 180;
  const dLon = (shed.longitude - userCoords.longitude) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(userCoords.latitude * Math.PI / 180) * Math.cos(shed.latitude * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const dist = parseFloat((R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2));

  return { ...shed, distance: dist };
}).sort((a, b) => a.distance - b.distance);

await supabase.from('profiles').update({
  nearest_shed_id: processed[0].id,
  nearest_shed_updated_at: new Date().toISOString(),
}).eq('id', user.id);
```

Logic:

- Gets the user location once and caches it.
- Reads verified sheds and fuel stocks.
- Computes distance to every shed using the Haversine formula.
- Sorts by distance so the nearest shed becomes the target for future notifications.
- Stores the nearest shed in `profiles` so later notification logic can target the correct user group.

### 3.1) Map Implementation Used in the App

The map in `UserHome.js` is not a native Google Maps component. It is built with:

- `react-native-webview` to host the map inside the React Native screen
- `Leaflet` for marker rendering and map interactions
- `OpenStreetMap` tiles for the base map layer

How it works:

1. The screen builds an HTML string that contains the Leaflet map.
2. The map is loaded inside a WebView.
3. User location is shown with a green marker.
4. Each shed is added as a marker on the map.
5. Marker color changes based on stock status:
   - red for out of stock
   - orange for uncertain stock
   - grey for no data
   - gold for normal availability
6. When a marker is tapped, the WebView posts the shed id back to React Native.

Relevant map code pattern:

```javascript

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

```

### 7) `supabase/index.ts` - Event Locking, Deduplication, and FCM Dispatch

```typescript
const events = await fetchUnprocessedEventsWithLock();

for (const event of events) {
  const users = await fetchUsersForShed(event.shed_id);
  const notificationResult = await sendNotificationsBatch(
    String(event.id), users, title, body, data
  );

  if (notificationResult.sentCount > 0 || users.length === 0) {
    await unlockEvent(String(event.id), true, event.locked_by || undefined);
  } else {
    await unlockEvent(String(event.id), false, event.locked_by || undefined);
    await incrementAttempt(String(event.id), event.attempts);
  }
}
```

Logic:

- Locks a batch of unprocessed events so only one worker handles them.
- Finds users whose `nearest_shed_id` matches the shed that restocked.
- Sends messages in parallel batches.
- Records sent/failed/skipped states to avoid duplicate sends.
- Marks the event processed only when delivery succeeds or there are no eligible users.

## Admin Web Structure

### Route Structure

The admin app is organized in `admin-web/src/App.jsx` as:

```text
/ -> /login
/login -> admin login screen
/admin -> protected admin area
  /admin/overview
  /admin/fuel-stations
  /admin/reports
```

### Structure Overview

- `admin-web/src/components/layout/AdminLayout.jsx` provides the shared shell for admin pages.
- `admin-web/src/components/navigation/ProtectedRoute.jsx` blocks access when the saved session is invalid.
- `admin-web/src/pages/LoginPage.jsx` performs the fixed-credential login check.
- `admin-web/src/pages/OverviewPage.jsx` shows counts and critical shortage highlights.

4. `ProtectedRoute` verifies the session before showing the dashboard.
5. Overview, fuel-station, and reports pages query Supabase directly for dashboard data.

### What Each Page Does

- Fuel stations: pending shed approvals and verification-document access.

## Current Risks & Improvement Priorities

### Verified Risks in Current Code Snapshot

1. **Client-side service-role exposure risk**  
   `src/screens/ShedSubmitReport.js` contains hardcoded service-role bearer key usage for direct function invocation. This should be removed from client code and handled server-side.

2. **Mixed security posture in SQL files**  
   `sql.txt` and `sql_new.txt` include both strict and relaxed policy fragments. Deployment should use a single reviewed migration path to avoid policy drift.

3. **Runtime ambiguity on edge file location**  
   Function code is stored in `supabase/index.ts`, while some docs mention `supabase/functions/process-restocks/index.ts`. Consolidating structure will reduce deployment mistakes.

### Practical Next Steps

- Move privileged invocation to secure backend-only path.
- Convert SQL setup text files into ordered migration files.
- Add automated tests for edge function branch logic (lock, dedup, retries).
- Add release checklist that validates trigger + RPC existence in target environment.
